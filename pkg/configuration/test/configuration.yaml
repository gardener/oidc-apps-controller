global:
  domainName: "domain.org"
  oauth2Proxy:
    scope: "openid email"
    clientId: "client-id"
    clientSecret: "client-secret"
    redirectUrl: "https://app.org/oauth2/callback"
    oidcIssuerUrl: "https://oidc-provider.org"
  kubeRbacProxy:
    kubeConfigStr: Imt1YmVjb25maWci
    kubeSecretRef:
      name: "kubeconfig"
  oidcCABundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi4uLgotLS0tLUVORCBDRVJUSUZJQ0FURS0tLS0tCg==
  oidcCASecretRef:
    name: "oidc-ca"

targets:
  # A target that shall inherit the configuration from the root level
  - name: "test-01"

 # A target with concrete configuration
  - name: "test-02"
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchExpressions:
        - {key: "app.kubernetes.io/name", operator: "In", values: ["test-02"]}
    targetPort: 8443
    targetProtocol: https
    ingress:
      create: true
      hostPrefix: "test-02-prefix"
      tlsSecretRef:
        name: "ingress-tls"
    oauth2Proxy:
      scope: "openid email target"
      clientId: "client-id-target"
      clientSecret: "client-secret-target"
      redirectUrl: "https://app.org/oauth2/callback"
      oidcIssuerUrl: "https://oidc-provider-target.org"
      sslInsecureSkipVerify: true
      insecureOidcSkipIssuerVerification: true
      insecureOidcSkipNonce: true
    kubeRbacProxy:
      kubeConfigStr: a3ViZWNvbmZpZy10YXJnZXQK
      kubeSecretRef:
        name: "target-kubeconfig"
    oidcCASecretRef:
      name: "target-oidc-ca"

  # A target with specific ingress host
  - name: test-03
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-03
    ingress:
      host: "this.overwrites"

  # A target without explicit ingress host
  - name: test-04
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-04

  # A target with HTTPRoute configuration
  - name: test-05
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-05
    httpRoute:
      create: true
      hostPrefix: "test-05-prefix"
      parentRefs:
        - name: "my-gateway"
          namespace: "gateway-system"
          sectionName: "https"

  # A target with specific HTTPRoute host
  - name: test-06
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-06
    httpRoute:
      create: true
      host: "custom.httproute.host"
      parentRefs:
        - name: "another-gateway"

  # A target with HTTPRoute but empty parentRefs (for testing validation warning)
  - name: test-07
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-07
    httpRoute:
      create: true
      hostPrefix: "test-07-prefix"

  # A target with ingress defaultPath
  - name: test-08
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-08
    ingress:
      create: true
      defaultPath: "/select/vmui"
      tlsSecretRef:
        name: "ingress-tls"

  # A target with HTTPRoute defaultPath
  - name: test-09
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-09
    httpRoute:
      create: true
      defaultPath: "/dashboard"
      parentRefs:
        - name: "my-gateway"
          namespace: "gateway-system"

  # A target with VirtualService configuration
  - name: test-10
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-10
    istioGateway:
      create: true
      hostPrefix: "test-10-prefix"

  # A target with specific VirtualService host
  - name: test-11
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-11
    istioGateway:
      create: true
      host: "custom.virtualservice.host"

  # A target with VirtualService but empty gateways (for testing validation warning)
  - name: test-12
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-12
    istioGateway:
      create: true
      hostPrefix: "test-12-prefix"

  # A target with VirtualService defaultPath
  - name: test-13
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-13
    istioGateway:
      create: true
      defaultPath: "/dashboard"

  # A target with VirtualService and Gateway creation
  - name: test-14
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-14
    istioGateway:
      create: true
      hostPrefix: "test-14-prefix"
      tlsSecretRef: "my-tls-secret"

  # A target with Gateway but default selector (empty)
  - name: test-15
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-15
    istioGateway:
      create: true
      tlsSecretRef: "another-tls-secret"

  # A target with Gateway disabled (create: false)
  - name: test-16
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: test
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: test-16
    istioGateway:
      create: false
