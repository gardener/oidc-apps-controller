configuration:
  oauth2Proxy:
  kubeRbacProxy:
  domainName: "example.com"
targets:
  - name: "nginx-1"
    labelSelector:
      matchLabels:
        app: nginx-1
    ingress:
      create: true
      ingressClassName: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
  - name: "nginx-2"
    labelSelector:
      matchLabels:
        app: nginx-2
    ingress:
      create: false
